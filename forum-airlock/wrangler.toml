name = "secure-worker"
main = "secure-worker.js"
compatibility_date = "2024-04-19"
compatibility_flags = [ "nodejs_compat" ]

[vars]
# Public PWA route is configured in Cloudflare for this Worker.
# LISTENER_URL must be a Cloudflare Tunnel hostname when deployed,
# because a deployed Worker cannot reach http://127.0.0.1 on your machine.
AIRLOCK_URL = "https://pod.yourcommunity.forum"
LISTENER_URL = "https://listener.yourcommunity.forum"
# Set via: npx wrangler secret put UNLOCK_TOKEN_KEY
# Pilot APK builds may set ALLOW_PILOT_BUNDLES = "1" until WebAuthn unlock is verified on device.
ALLOW_PILOT_BUNDLES = "1"
# Origins allowed to claim a WebAuthn rp.id at this Worker. The Pod app
# can be served from either airlock.yourcommunity.forum (via Cloudflare
# route) or secure-worker.forum-community.workers.dev directly. The Worker
# binds the rp.id / expectedOrigin to whichever origin the client posts,
# but only if it appears in this list.
WEBAUTHN_ALLOWED_ORIGINS = "https://airlock.yourcommunity.forum,https://secure-worker.forum-community.workers.dev"
# Civic AI Kami chat proxy. POC uses an unprotected tunnel hostname because
# this local Wrangler OAuth token cannot manage Cloudflare Zero Trust Access.
AI_UPSTREAM_URL = "https://ai-open.yourcommunity.forum"
AI_UPSTREAM_MODEL = "qwen2.5:14b-instruct-q4_K_M"
AI_DAILY_QUOTA = "100"

# Set via:
#   npx wrangler secret put AI_ACCESS_CLIENT_ID
#   npx wrangler secret put AI_ACCESS_CLIENT_SECRET

# Set via: npx wrangler secret put AIRLOCK_SECRET
# Must match AIRLOCK_SECRET in ../forum.config.env

# Routes:
#   /                       gate (WebAuthn)
#   /register/*             WebAuthn challenge + verify
#   /api/forum/receipt      private encrypted receipt -> listener /submit
#   /api/forum/feedback     opt-in cooperative export -> D1 forum-db
#   /api/ai/chat            signed Civic AI Kami chat -> on-prem Ollama
#   /api/civic/submit       legacy alias of /api/forum/receipt   (deprecated)
#   /api/civic/export       legacy alias of /api/forum/feedback  (deprecated)
#   /api/zkemail/*          zkEmail proof verify + status
#   /api/pod/*              signed Personal Pod RPC -> PersonalPodDO (per-device)
#   /pod, /assets/*         compiled forum-pod (Vite build) bundled into the Worker

[[d1_databases]]
binding = "DB"
database_name = "forum-db"
database_id = "b23bdfa3-d8ba-4092-a5ac-ada4d697bc3b"

# Personal Pod Durable Object: one DO instance per device credential.
# Replaces the Community Solid Server (forum-solid) + provision-bridge
# stack — see forum-airlock/pod-do.js.
[[durable_objects.bindings]]
name = "POD"
class_name = "PersonalPodDO"

# Required migration to enable the SQLite-backed DO storage class.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersonalPodDO"]

# Add this to bundle the compiled React app into the Worker
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# Workers Logs (Observability). Explicitly disabled: signed Pod RPC
# bundles + Forum Feedback payloads carry PII-adjacent data we do not
# want forwarded to the Cloudflare dashboard. Flip `enabled = true`
# temporarily when debugging a deploy, then turn it off again.
[observability]
enabled = false