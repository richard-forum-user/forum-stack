name = "coop-pipeline"
main = "secure-worker.js"
compatibility_date = "2026-05-26"
compatibility_flags = [ "nodejs_compat" ]

[vars]
ALLOW_PILOT_BUNDLES = "0"
CIVIC_ANALYSIS_MIN_SUBMISSIONS = "1"
FORUM_AUTO_EDGE_ANALYSIS = "1"
ALLOW_DEV_CIVIC_PUBLISH = "0"
CIVIC_PUBLISH_VERBATIM_COMMENTS = "0"
MEMBERSHIP_ISSUER = "https://coop.yourcommunity.forum"
MEMBERSHIP_TTL_SEC = "86400"
# Set FORUM_AUTO_EDGE_ANALYSIS = "1" to re-run analysis after each forum feedback ingest.
# Set ALLOW_DEV_MEMBERSHIP = "1" only on staging (skips JWT signing when keys absent).

# Set via: npx wrangler secret put AIRLOCK_SECRET
# Set via: npx wrangler secret put FORUM_EGRESS_URL
# Set via: npx wrangler secret put FORUM_SECRET
# Set via: npx wrangler secret put TURNSTILE_SECRET
# Set via: npx wrangler secret put STRIPE_SECRET_KEY
# Set via: npx wrangler secret put STRIPE_WEBHOOK_SECRET
# Set via: npx wrangler secret put MEMBERSHIP_PRIVATE_KEY_JWK
# Set via: npx wrangler secret put MEMBERSHIP_PUBLIC_KEY_JWK
# Set via: npx wrangler secret put MEMBER_HASH_SALT

[[d1_databases]]
binding = "DB"
database_name = "forum-db"
database_id = "b23bdfa3-d8ba-4092-a5ac-ada4d697bc3b"

[[durable_objects.bindings]]
name = "RECOVERY"
class_name = "RecoveryDO"

[[migrations]]
tag = "v1-recovery-do"
new_sqlite_classes = ["RecoveryDO"]

[triggers]
crons = ["0 */6 * * *"]

[observability]
enabled = true
head_sampling_rate = 0.1

[[routes]]
pattern = "coop.yourcommunity.forum"
custom_domain = true
